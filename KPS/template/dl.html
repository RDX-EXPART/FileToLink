<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Downloading — {{ file_name }} | RDX File Stream</title>
  <meta name="description" content="Your download is being prepared by RDX File Stream.">
  <meta name="theme-color" content="#09090d">
  <meta http-equiv="refresh" content="2;url={{ src }}">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%2309090d'/%3E%3Cpath d='M20 25h38c15 0 24 8 24 20 0 9-5 15-13 18l15 17H64L51 65H39v15H20V25zm19 15v11h17c5 0 8-2 8-6s-3-5-8-5H39z' fill='%23ff2438'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #fff;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at 15% 12%, rgba(255,36,56,.20), transparent 32%),
        radial-gradient(circle at 88% 84%, rgba(181,0,23,.16), transparent 36%),
        #08080c;
    }
    .card {
      width: min(560px, 100%);
      padding: 34px 28px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 24px;
      background: rgba(17,17,25,.82);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0,0,0,.48);
    }
    .logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      font-size: 29px;
      color: #fff;
      background: linear-gradient(135deg, #ff2438, #b50017);
      box-shadow: 0 14px 35px rgba(255,36,56,.28);
    }
    .eyebrow {
      color: #ff5d6d;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .16em;
    }
    h1 {
      margin: 10px 0 8px;
      font-size: clamp(24px, 6vw, 38px);
      line-height: 1.1;
    }
    .file {
      margin: 18px 0;
      padding: 13px 15px;
      overflow-wrap: anywhere;
      color: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
    }
    .loader {
      width: 42px;
      height: 42px;
      margin: 23px auto;
      border: 4px solid rgba(255,255,255,.12);
      border-top-color: #ff2438;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,.62); line-height: 1.65; }
    .download-btn, .telegram-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      margin-top: 10px;
      padding: 14px 18px;
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      transition: transform .2s ease;
    }
    .download-btn {
      background: linear-gradient(135deg, #ff2438, #b50017);
    }
    .telegram-btn {
      color: rgba(255,255,255,.90);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
    }
    .download-btn:hover, .telegram-btn:hover { transform: translateY(-2px); }
    .small { margin-top: 20px; font-size: 12px; }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo"><i class="fa-solid fa-bolt"></i></div>
    <div class="eyebrow">RDX FILE STREAM</div>
    <h1>Your download is ready</h1>

    <div class="file">{{ file_name }}</div>
    <div class="loader" aria-label="Preparing download"></div>

    <p>Your download should start automatically. If it does not, use the button below.</p>

    <a class="download-btn" href="{{ src }}" download="{{ file_name }}">
      <i class="fa-solid fa-cloud-arrow-down"></i>
      Download Now
    </a>

    <a class="telegram-btn" href="https://t.me/rdxmovie_hd" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-telegram"></i>
      Join RDX MOVIE HD
    </a>

    <p class="small">Fast • Secure • Unlimited Streaming</p>
  </main>
</body>
</html>
